services:
  vliegmasjien:
    build: .
    container_name: vliegmasjien-pro
    restart: unless-stopped
    ports:
      - "8390:8390"
    volumes:
      - vliegmasjien-data:/data
    environment:
      # Point this at your dump1090 container's aircraft.json.
      # If dump1090 runs in another compose project, use the host IP instead,
      # e.g. http://192.168.1.50:8080/data/aircraft.json
      - DUMP1090_URL=${DUMP1090_URL:-http://dump1090:8080/data/aircraft.json}
      # Optional — enables the "Ask Claude about this plane" feature.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Optional — extra weather layers (clouds). Rain radar works without it.
      - OWM_API_KEY=${OWM_API_KEY:-}
    # Uncomment if dump1090 runs on the same docker network:
    # networks:
    #   - adsb

volumes:
  vliegmasjien-data:

# networks:
#   adsb:
#     external: true
